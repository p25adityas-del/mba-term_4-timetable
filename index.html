<title>MBA Timetable</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;font-size:16px;overscroll-behavior:none}
:root{--bg:#0f1120;--card:#161928;--border:#1e2235;--text:#e2e8f0;--muted:#7a8fac;--accent:#6366f1;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--input-bg:#1e2235;}
body.light{--bg:#f0f2f8;--card:#ffffff;--border:#e2e8f0;--text:#1a1f36;--muted:#6b7280;--input-bg:#f0f2f8;}
body{background:var(--bg);color:var(--text);transition:background .3s,color .3s}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header-title{font-size:18px;font-weight:800;color:var(--accent)}
.header-sub{font-size:13px;color:var(--muted);margin-top:2px}
.theme-btn{background:var(--border);border:none;border-radius:20px;padding:8px 16px;cursor:pointer;font-size:14px;color:var(--text);font-weight:600;transition:background .3s,color .3s}
.content{padding:20px 16px 100px}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;padding:12px 0 10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-icon{font-size:20px}
.nav-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.3px}
.nav-label.active{color:var(--accent)}
.nav-dot{width:18px;height:3px;border-radius:2px;background:var(--accent)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center}

/* CLASS CARD */
.class-card{border-radius:14px;padding:16px 18px;margin-bottom:10px;transition:all .2s}
.pill{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;letter-spacing:.3px;display:inline-block}
.att-btns{display:flex;gap:8px;margin-top:12px}
.att-btn{flex:1;border:none;border-radius:10px;padding:9px 4px;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;opacity:.55}
.att-btn.active{opacity:1;transform:scale(1.04)}
.att-present{background:#10b98122;color:#10b981;border:1.5px solid #10b98155}
.att-present.active{background:#10b98133;border-color:#10b981}
.att-absent{background:#ef444422;color:#ef4444;border:1.5px solid #ef444455}
.att-absent.active{background:#ef444433;border-color:#ef4444}
.att-cancelled{background:#64748b22;color:#94a3b8;border:1.5px solid #64748b55}
.att-cancelled.active{background:#64748b33;border-color:#94a3b8}
.break-line{text-align:center;color:var(--muted);font-size:13px;margin:10px 0;display:flex;align-items:center;gap:8px}
.break-line::before,.break-line::after{content:'';flex:1;height:1px;background:var(--border)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid var(--border);transition:all .15s;padding:6px 2px;min-height:54px}
.cal-day-num{font-size:14px;font-weight:800}
.cal-day-count{font-size:11px;font-weight:800;background:var(--accent);color:#fff;border-radius:20px;padding:2px 7px;margin-top:3px;white-space:nowrap}

/* WEEK GRID */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.week-day{text-align:center;cursor:pointer;border-radius:12px;padding:8px 2px;border:1px solid var(--border)}

/* MISC */
.bar-bg{flex:1;height:10px;background:var(--border);border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px;transition:width .5s}
.nav-arrows{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.arrow-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;cursor:pointer;color:var(--text);font-size:18px}
.today-btn{display:block;margin:0 auto 18px;background:color-mix(in srgb,var(--accent) 20%,transparent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:20px;padding:7px 20px;color:var(--accent);font-weight:700;font-size:13px;cursor:pointer}
.badge{background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent);border-radius:20px;padding:3px 10px;font-size:12px;margin-left:8px}
.alert-box{border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:14px;font-weight:600;text-align:center}
.disclaimer{font-size:12px;color:var(--muted);background:color-mix(in srgb,var(--yellow) 10%,transparent);border:1px solid color-mix(in srgb,var(--yellow) 30%,transparent);border-radius:10px;padding:10px 14px;margin-bottom:14px;line-height:1.6}
.edit-att-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:700;padding:0;margin-top:8px;text-decoration:underline}

/* ONBOARDING */
.onboard{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px;background:var(--bg)}
.onboard-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:32px 26px;width:100%;max-width:420px}
.onboard-title{font-size:26px;font-weight:800;color:var(--accent);margin-bottom:6px}
.onboard-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.ob-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:.5px}
.ob-input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:16px;outline:none;margin-bottom:20px}
.ob-input:focus{border-color:var(--accent)}
.ob-subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ob-subj-btn{padding:12px 12px;border-radius:12px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all .2s;user-select:none}
.ob-subj-btn.selected{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.ob-next-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
.ob-next-btn:disabled{opacity:.4;cursor:not-allowed}
.sec-select{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;font-weight:600;outline:none;margin-top:8px}

/* EDIT PROFILE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-handle{width:44px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 20px}
.modal-title{font-size:20px;font-weight:800;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px}

/* ADMIN */
.admin-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;background:var(--bg)}
.admin-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:440px}
.admin-title{font-size:20px;font-weight:800;color:var(--accent);margin-bottom:4px}
.admin-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.admin-input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
.admin-input:focus{border-color:var(--accent)}
.admin-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}
.admin-btn:disabled{opacity:.4;cursor:not-allowed}
.admin-btn.danger{background:#ef4444}
.admin-btn.secondary{background:var(--border);color:var(--text)}
.sync-status{font-size:13px;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-weight:600}
.sync-ok{background:#10b98122;color:#10b981;border:1px solid #10b98144}
.sync-err{background:#ef444422;color:#ef4444;border:1px solid #ef444444}
.sync-info{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;max-height:200px;overflow-y:auto;display:block}
.preview-table th{background:var(--border);padding:7px 8px;text-align:left;font-weight:700;position:sticky;top:0}
.preview-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
</style>
</head>

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(',').map(c=>c.trim().replace(/"/g,''));
    if(cols.length<headers.length)continue;
    const obj={};
    headers.forEach((h,idx)=>obj[h]=cols[idx]||'');
    if(!obj.date||!obj.subject)continue;
    rows.push([obj.date,parseInt(obj.week)||1,obj.subject,obj.session||'1',obj.room||'TBD',parseInt(obj.slot)||0]);
  }
  return rows;
}
async function fetchFromSheet(url){
  const resp=await fetch(url+'&t='+Date.now());
  if(!resp.ok)throw new Error('HTTP '+resp.status);
  const text=await resp.text();
  return parseCSV(text);
}

function buildMySchedule(){
  MY_SCHEDULE={};
  if(!chosenSubjects.length)return;
  const mySet=new Set(chosenSubjects);
  RAW_ALL.forEach(([date,week,subjectKey,session,room,slot])=>{
    if(!mySet.has(subjectKey))return;
    if(!MY_SCHEDULE[date])MY_SCHEDULE[date]=[];
    const key=`${date}|${subjectKey}|${session}`;
    MY_SCHEDULE[date].push({date,week,subject:subjectKey,session,room,slot,key});
  });
  Object.keys(MY_SCHEDULE).forEach(d=>MY_SCHEDULE[d].sort((a,b)=>a.slot-b.slot));
}

function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function isToday(d){return fmt(d)===fmt(new Date());}
function getDayLabel(d){
  const s=fmt(d);
  if(HOLIDAYS[s])return{text:HOLIDAYS[s],type:'holiday'};
  if(SPECIAL[s])return{text:SPECIAL[s],type:'special'};
  const dt=new Date(s+'T00:00:00');
  if(dt>=new Date("2026-09-07T00:00:00")&&dt<=new Date("2026-09-17T23:59:59")&&s!=="2026-09-14")return{text:'ET Exam Week',type:'exam'};
  if(SIP.includes(s))return{text:'SIP Presentations (afternoon)',type:'sip'};
  return null;
}
function getWeekDates(base){
  const d=new Date(base),day=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-((day+6)%7));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});
}

function bindAdminEvents(){
  if(!adminLoggedIn){
    const inp=document.getElementById('admin-pw-input'),btn=document.getElementById('admin-login-btn'),err=document.getElementById('admin-pw-err');
    const tryLogin=()=>{if(inp.value===getAdminPassword()){adminLoggedIn=true;adminSyncMsg=null;render();}else{err.style.display='block';inp.value='';}};
    btn.addEventListener('click',tryLogin);inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});return;
  }
  document.getElementById('admin-logout-btn')?.addEventListener('click',()=>{adminLoggedIn=false;adminMode=false;adminSyncMsg=null;adminPreviewData=null;render();});
  document.getElementById('admin-fetch-btn')?.addEventListener('click',async()=>{
    const urlInput=document.getElementById('admin-sheet-url').value.trim();
    if(!urlInput){adminSyncMsg={type:'sync-err',text:'❌ Please enter a sheet URL'};render();return;}
    adminSheetUrl=urlInput;localStorage.setItem(LS_SHEET_URL,adminSheetUrl);
    adminSyncing=true;adminSyncMsg={type:'sync-info',text:'<span class="spinner"></span>Fetching…'};adminPreviewData=null;render();bindAdminEvents();
    try{const data=await fetchFromSheet(adminSheetUrl);if(!data||data.length===0)throw new Error('No valid rows found.');adminPreviewData=data;adminSyncing=false;adminSyncMsg={type:'sync-ok',text:`✅ Fetched ${data.length} entries.`};}
    catch(e){adminSyncing=false;adminSyncMsg={type:'sync-err',text:`❌ Error: ${e.message}`};}
    render();bindAdminEvents();
  });
  document.getElementById('admin-confirm-btn')?.addEventListener('click',()=>{
    if(!adminPreviewData)return;
    localStorage.setItem(LS_TIMETABLE,JSON.stringify(adminPreviewData));localStorage.setItem(LS_LAST_SYNC,new Date().toISOString());
    RAW_ALL=adminPreviewData;buildMySchedule();adminPreviewData=null;adminSyncMsg={type:'sync-ok',text:`✅ Applied! ${RAW_ALL.length} entries live.`};render();bindAdminEvents();
  });
  document.getElementById('admin-cancel-preview-btn')?.addEventListener('click',()=>{adminPreviewData=null;adminSyncMsg=null;render();bindAdminEvents();});
  document.getElementById('admin-clear-btn')?.addEventListener('click',()=>{
    if(confirm('Clear sheet data and revert to built-in?')){localStorage.removeItem(LS_TIMETABLE);localStorage.removeItem(LS_LAST_SYNC);RAW_ALL=FALLBACK_RAW;buildMySchedule();adminSyncMsg={type:'sync-info',text:'ℹ️ Reverted to built-in data.'};adminPreviewData=null;render();bindAdminEvents();}
  });
  document.getElementById('admin-change-pw-btn')?.addEventListener('click',()=>{
    const np=document.getElementById('admin-new-pw').value,cp=document.getElementById('admin-confirm-pw').value,msg=document.getElementById('admin-pw-msg');
    if(np.length<6){msg.style.display='block';msg.style.color='#ef4444';msg.textContent='Min 6 characters.';return;}
    if(np!==cp){msg.style.display='block';msg.style.color='#ef4444';msg.textContent='Passwords do not match.';return;}
    localStorage.setItem(ADMIN_PASSWORD_KEY,np);msg.style.display='block';msg.style.color='#10b981';msg.textContent='✅ Password updated!';
    document.getElementById('admin-new-pw').value='';document.getElementById('admin-confirm-pw').value='';
  });
}

function renderAttendance(){
  const mySubjects=[...new Set(chosenSubjects)];
  const stats={};
  mySubjects.forEach(s=>{stats[s]={P:0,A:0,C:0,total:0};});
  let totalP=0,totalA=0,totalC=0,totalAll=0;
  RAW_ALL.forEach(([date,,subject,session])=>{
    if(!stats[subject])return;
    const att=localStorage.getItem(`att_${date}|${subject}|${session}`);
    stats[subject].total++;totalAll++;
    if(att==='P'){stats[subject].P++;totalP++;}else if(att==='A'){stats[subject].A++;totalA++;}else if(att==='C'){stats[subject].C++;totalC++;}
  });
  const marked=totalP+totalA+totalC;
  const den=totalP+totalA;
  const pct=den>0?Math.round(totalP/den*100):null;
  const col=pct===null?'var(--muted)':pct>=85?'#10b981':pct>=75?'#f59e0b':'#ef4444';
  const safe=pct!==null&&pct>=85?Math.max(0,Math.floor(totalP/0.85)-den):0;
  const need=den>0&&pct<85?Math.max(0,Math.ceil(0.85*den)-totalP):0;
  const warn=pct===null?'':pct<85?`<div class="alert-box" style="background:#ef444422;border:1px solid #ef444444;color:#ef4444">⚠️ Below 85%! Need ${need} more present classes.</div>`:`<div class="alert-box" style="background:#10b98122;border:1px solid #10b98144;color:#10b981">✅ Can miss ${safe} more class${safe===1?'':'es'} and stay ≥85%</div>`;
  const subjRows=mySubjects.map(subj=>{
    const s=ALL_SUBJECTS[subj],st=stats[subj];
    const d2=st.P+st.A,p2=d2>0?Math.round(st.P/d2*100):null;
    const c2=p2===null?'var(--muted)':p2>=85?'#10b981':p2>=75?'#f59e0b':'#ef4444';
    return`<div style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;align-items:center">
        <div>${pill(subj,false)} <span style="font-size:12px;color:var(--muted)">${s.name}</span></div>
        <span style="font-size:16px;font-weight:800;color:${c2}">${p2!==null?p2+'%':'–'}</span>
      </div>
      <div style="height:10px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px">
        <div style="height:10px;background:${c2};width:${p2||0}%;border-radius:10px"></div>
      </div>
      <div style="display:flex;gap:12px;font-size:12px;color:var(--muted)">
        <span>✅ ${st.P}</span><span>❌ ${st.A}</span><span>🔵 ${st.C}</span><span>of ${st.total}</span>
      </div>
    </div>`;
  }).join('');
  const recentList=[];
  RAW_ALL.forEach(([date,,subject,session])=>{
    if(!stats[subject])return;
    const key=`${date}|${subject}|${session}`;
    const att=localStorage.getItem(`att_${key}`);
    if(att)recentList.push({date,subject,session,att});
  });
  recentList.sort((a,b)=>b.date.localeCompare(a.date));
  const recentHtml=recentList.slice(0,12).length===0
    ?`<div style="text-align:center;color:var(--muted);padding:20px;font-size:14px">No attendance marked yet.<br>Go to <b>Daily</b> view to mark.</div>`
    :recentList.slice(0,12).map(({date,subject,session,att})=>{
      const col2=att==='P'?'#10b981':att==='A'?'#ef4444':'#94a3b8';
      const lbl=att==='P'?'✅ Present':att==='A'?'❌ Absent':'🔵 Cancelled';
      return`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>${pill(subject,true)} <span style="font-size:12px;color:var(--muted)">${new Date(date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})} · Ses ${session}</span></div>
        <span style="font-size:12px;font-weight:700;color:${col2}">${lbl}</span>
      </div>`;
    }).join('');
  return`
    <div style="font-size:20px;font-weight:800;margin-bottom:6px">✅ Attendance</div>
    <div class="disclaimer">📌 Personal reference only. Institute maintains official records. Min required: <b>85%</b> (below = grade drop).</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="card" style="grid-column:1/-1;text-align:center">
        <div style="font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px">OVERALL ATTENDANCE</div>
        <div style="font-size:48px;font-weight:800;color:${col}">${pct!==null?pct+'%':'–'}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">${totalP} Present / ${totalA} Absent / ${totalC} Cancelled</div>
        <div style="height:12px;background:var(--border);border-radius:10px;overflow:hidden;margin-top:12px">
          <div style="height:12px;background:${col};width:${pct||0}%;border-radius:10px"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--muted)">
          <span>0%</span><span style="color:#f59e0b;font-weight:700">75%</span><span style="color:#10b981;font-weight:700">85% ✓</span><span>100%</span>
        </div>
      </div>
      <div class="card"><div style="font-size:12px;color:var(--muted);font-weight:600">MARKED</div><div style="font-size:26px;font-weight:800;color:var(--accent);margin-top:4px">${marked}</div><div style="font-size:12px;color:var(--muted)">of ${totalAll}</div></div>
      <div class="card"><div style="font-size:12px;color:var(--muted);font-weight:600">UNMARKED</div><div style="font-size:26px;font-weight:800;color:var(--yellow);margin-top:4px">${totalAll-marked}</div></div>
    </div>
    ${warn}
    <div class="card" style="margin-bottom:14px"><div style="font-size:15px;font-weight:700;margin-bottom:16px">Subject-wise Breakdown</div>${subjRows}</div>
    <div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:12px">Recent Activity</div>${recentHtml}</div>`;
}

function renderAnalytics(){
  let total=0,perSubj={},perDow={Mon:0,Tue:0,Wed:0,Thu:0,Fri:0,Sat:0,Sun:0};
  Object.entries(MY_SCHEDULE).forEach(([d,cls])=>{
    total+=cls.length;
    const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(d+'T00:00:00').getDay()];
    perDow[dow]=(perDow[dow]||0)+cls.length;
    cls.forEach(c=>{perSubj[c.subject]=(perSubj[c.subject]||0)+1;});
  });
  const top=Object.entries(perSubj).sort((a,b)=>b[1]-a[1])[0];
  const bd=Object.entries(perDow).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])[0];
  return`
    <div style="font-size:20px;font-weight:800;margin-bottom:18px">📊 Analytics</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      ${[{l:'Total Classes',v:total,i:'📚'},{l:'Total Hours',v:`${total*1.5}h`,i:'⏱'},{l:'Most Frequent',v:ALL_SUBJECTS[top?.[0]]?.short||'–',i:'🏆'},{l:'Busiest Day',v:bd?.[0]||'–',i:'🔥'}].map(s=>`
      <div class="card"><div style="font-size:22px;margin-bottom:6px">${s.i}</div><div style="font-size:26px;font-weight:800;color:var(--accent)">${s.v}</div><div style="font-size:12px;color:var(--muted);font-weight:600;margin-top:2px">${s.l}</div></div>`).join('')}
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px">Classes per Subject</div>
      ${Object.entries(perSubj).sort((a,b)=>b[1]-a[1]).map(([subj,n])=>{
        const s=ALL_SUBJECTS[subj],p=Math.round(n/total*100);
        return`<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:13px;font-weight:700">${s.short} <span style="color:var(--muted);font-size:12px">${s.name}</span></span>
            <span style="font-size:12px;color:var(--muted)">${n} · ${p}%</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="background:${s.color};width:${p}%"></div></div>
        </div>`;}).join('')}
    </div>
    <div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px">Day-wise Distribution</div>
      ${Object.entries(perDow).map(([day,n])=>{
        const mx=Math.max(...Object.values(perDow)),p=mx>0?Math.round(n/mx*100):0;
        return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div style="width:36px;font-size:13px;font-weight:700;color:var(--muted)">${day}</div>
          <div class="bar-bg"><div class="bar-fill" style="background:var(--accent);width:${p}%;opacity:${n===0?0:1}"></div></div>
          <div style="width:28px;font-size:13px;color:${n>0?'var(--accent)':'var(--muted)'};font-weight:700;text-align:right">${n}</div>
        </div>`;}).join('')}
    </div>`;
}

// ── ONBOARDING (first visit) ──────────────────────────────────────────────────
function renderOnboard(){
  if(onboardStep===1){
    return`<div class="onboard">
      <div class="onboard-card">
        <div class="onboard-title">👋 Welcome!</div>
        <div class="onboard-sub">Set up your personal MBA Term IV timetable — takes just a minute.</div>
        <label class="ob-label">Your Name</label>
        <input class="ob-input" id="ob-name" type="text" placeholder="Enter your full name" value="${tempName}" autofocus/>
        <button class="ob-next-btn" id="ob-next1" ${tempName.trim()?'':'disabled'}>Continue →</button>
      </div>
    </div>`;
  }
  const mc=Object.keys(COURSES_WITH_SECTIONS);
  const sc=SINGLE_SECTION_COURSES;
  const multiGrid=mc.map(c=>{
    const sel=tempSubjectSelections[c],sections=COURSES_WITH_SECTIONS[c];
    const sInfo=sel?ALL_SUBJECTS[`${c}-${sel}`]:null;
    const color=sInfo?.color||'var(--accent)';
    return`<div class="ob-subj-btn ${sel?'selected':''}" id="course-btn-${c}" data-course="${c}"
      style="${sel?`border-color:${color};background:${color}18;color:${color}`:''}">
      <div style="font-size:14px;font-weight:700;pointer-events:none">${c}</div>
      <div style="font-size:11px;margin-top:3px;opacity:.8;pointer-events:none">${sel?'Section '+sel:'Sections: '+sections.join(', ')}</div>
      ${sel?`<select class="sec-select" id="sel-${c}" style="margin-top:8px;border-color:${color};pointer-events:auto">
        ${sections.map(s=>`<option value="${s}" ${sel===s?'selected':''}>${s}</option>`).join('')}
      </select>`:''}
    </div>`;
  }).join('');
  const singleGrid=sc.map(c=>{
    const s=ALL_SUBJECTS[c],isSel=tempSubjectSelections[c]==='yes';
    return`<div class="ob-subj-btn ${isSel?'selected':''}" data-single="${c}"
      style="${isSel?`border-color:${s.color};background:${s.color}18;color:${s.color}`:''}">
      <div style="font-size:14px;font-weight:700;pointer-events:none">${c}</div>
      <div style="font-size:11px;margin-top:3px;opacity:.8;pointer-events:none">${s.name}</div>
    </div>`;
  }).join('');
  const hasAny=Object.keys(tempSubjectSelections).length>0;
  return`<div class="onboard">
    <div class="onboard-card" style="max-height:90vh;overflow-y:auto">
      <div class="onboard-title">📚 Select Subjects</div>
      <div class="onboard-sub">Tap to select. Choose your section for multi-section courses.</div>
      <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">Courses with Sections</div>
      <div class="ob-subj-grid" id="multi-grid">${multiGrid}</div>
      <div style="font-size:13px;font-weight:700;color:var(--muted);margin:18px 0 10px;text-transform:uppercase;letter-spacing:.5px">Single-section Courses</div>
      <div class="ob-subj-grid" id="single-grid">${singleGrid}</div>
      <div style="display:flex;gap:10px;margin-top:12px">
        <button class="ob-next-btn" id="ob-back2" style="background:var(--border);color:var(--text);flex:.4">← Back</button>
        <button class="ob-next-btn" id="ob-next2" ${hasAny?'':'disabled'} style="flex:1">Start →</button>
      </div>
    </div>
  </div>`;
}

function bindOnboard(){
  if(onboardStep===1){
    const inp=document.getElementById('ob-name'),btn=document.getElementById('ob-next1');
    inp.addEventListener('input',()=>{tempName=inp.value;btn.disabled=!tempName.trim();});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&tempName.trim()){onboardStep=2;render();}});
    btn.addEventListener('click',()=>{if(tempName.trim()){onboardStep=2;render();}});
    return;
  }
  function reRenderMulti(){
    const mg=document.getElementById('multi-grid');if(!mg)return;
    mg.innerHTML=Object.keys(COURSES_WITH_SECTIONS).map(c=>{
      const sel=tempSubjectSelections[c],sections=COURSES_WITH_SECTIONS[c];
      const sInfo=sel?ALL_SUBJECTS[`${c}-${sel}`]:null;const color=sInfo?.color||'var(--accent)';
      return`<div class="ob-subj-btn ${sel?'selected':''}" id="course-btn-${c}" data-course="${c}"
        style="${sel?`border-color:${color};background:${color}18;color:${color}`:''}">
        <div style="font-size:14px;font-weight:700;pointer-events:none">${c}</div>
        <div style="font-size:11px;margin-top:3px;opacity:.8;pointer-events:none">${sel?'Section '+sel:'Sections: '+sections.join(', ')}</div>
        ${sel?`<select class="sec-select" id="sel-${c}" style="margin-top:8px;border-color:${color};pointer-events:auto">
          ${sections.map(s=>`<option value="${s}" ${sel===s?'selected':''}>${s}</option>`).join('')}
        </select>`:''}
      </div>`;
    }).join('');
    document.getElementById('ob-next2').disabled=Object.keys(tempSubjectSelections).length===0;
    attachMultiListeners();
  }
  function reRenderSingle(){
    const sg=document.getElementById('single-grid');if(!sg)return;
    sg.innerHTML=SINGLE_SECTION_COURSES.map(c=>{
      const s=ALL_SUBJECTS[c],isSel=tempSubjectSelections[c]==='yes';
      return`<div class="ob-subj-btn ${isSel?'selected':''}" data-single="${c}"
        style="${isSel?`border-color:${s.color};background:${s.color}18;color:${s.color}`:''}">
        <div style="font-size:14px;font-weight:700;pointer-events:none">${c}</div>
        <div style="font-size:11px;margin-top:3px;opacity:.8;pointer-events:none">${s.name}</div>
      </div>`;
    }).join('');
    document.getElementById('ob-next2').disabled=Object.keys(tempSubjectSelections).length===0;
    attachSingleListeners();
  }
  function attachMultiListeners(){
    document.querySelectorAll('[data-course]').forEach(el=>{
      el.addEventListener('click',e=>{
        if(e.target.tagName==='SELECT'||e.target.tagName==='OPTION')return;
        const c=el.dataset.course;
        if(tempSubjectSelections[c])delete tempSubjectSelections[c];else tempSubjectSelections[c]=COURSES_WITH_SECTIONS[c][0];
        reRenderMulti();
      });
    });
    document.querySelectorAll('[id^="sel-"]').forEach(sel=>{
      sel.addEventListener('change',e=>{e.stopPropagation();tempSubjectSelections[e.target.id.replace('sel-','')]=e.target.value;});
    });
  }
  function attachSingleListeners(){
    document.querySelectorAll('[data-single]').forEach(el=>{
      el.addEventListener('click',()=>{
        const c=el.dataset.single;
        if(tempSubjectSelections[c])delete tempSubjectSelections[c];else tempSubjectSelections[c]='yes';
        reRenderSingle();
      });
    });
  }
  attachMultiListeners();attachSingleListeners();
  document.getElementById('ob-back2')?.addEventListener('click',()=>{onboardStep=1;render();bindOnboard();});
  document.getElementById('ob-next2')?.addEventListener('click',()=>{
    const result=[];
    Object.entries(tempSubjectSelections).forEach(([c,v])=>{result.push(v==='yes'?c:`${c}-${v}`);});
    studentName=tempName.trim();chosenSubjects=result;
    localStorage.setItem('studentName',studentName);localStorage.setItem('chosenSubjects',JSON.stringify(chosenSubjects));
    buildMySchedule();render();
  });
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
function bindEvents(){
  document.querySelectorAll('[data-view]').forEach(btn=>btn.addEventListener('click',()=>{view=btn.dataset.view;render();}));
  document.getElementById('themeBtn')?.addEventListener('click',()=>{dark=!dark;localStorage.setItem('theme',dark?'dark':'light');render();});
  document.getElementById('editProfileBtn')?.addEventListener('click',()=>{
    editName=studentName;
    editSubjectSelections={};
    chosenSubjects.forEach(key=>{
      const s=ALL_SUBJECTS[key];if(!s)return;
      if(s.section)editSubjectSelections[s.course]=s.section;
      else editSubjectSelections[s.course]='yes';
    });
    showEditProfile=true;render();bindEditProfileModal();
  });
  document.getElementById('resetBtn')?.addEventListener('click',()=>{
    gearTapCount++;clearTimeout(gearTapTimer);
    if(gearTapCount>=5){gearTapCount=0;adminMode=true;adminLoggedIn=false;render();return;}
    gearTapTimer=setTimeout(()=>{gearTapCount=0;},600);
  });
  document.querySelectorAll('[data-date]').forEach(el=>el.addEventListener('click',()=>{selectedDate=new Date(el.dataset.date+'T00:00:00');view='daily';render();}));
  document.querySelectorAll('[data-goto-date]').forEach(el=>el.addEventListener('click',()=>{selectedDate=new Date(el.getAttribute('data-goto-date')+'T00:00:00');view='daily';render();}));
  document.getElementById('prevDay')?.addEventListener('click',()=>{const d=new Date(selectedDate);d.setDate(d.getDate()-1);selectedDate=d;render();});
  document.getElementById('nextDay')?.addEventListener('click',()=>{const d=new Date(selectedDate);d.setDate(d.getDate()+1);selectedDate=d;render();});
  document.getElementById('goToday')?.addEventListener('click',()=>{selectedDate=new Date();render();});
  document.getElementById('prevWeek')?.addEventListener('click',()=>{const d=new Date(weekBase);d.setDate(d.getDate()-7);weekBase=d;render();});
  document.getElementById('nextWeek')?.addEventListener('click',()=>{const d=new Date(weekBase);d.setDate(d.getDate()+7);weekBase=d;render();});
  document.getElementById('goThisWeek')?.addEventListener('click',()=>{weekBase=new Date();render();});
  document.getElementById('prevMonth')?.addEventListener('click',()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1);render();});
  document.getElementById('nextMonth')?.addEventListener('click',()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1);render();});
  document.querySelectorAll('.att-btn').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();const key=btn.dataset.key,val=btn.dataset.val,cur=localStorage.getItem(`att_${key}`);
    if(cur===val)localStorage.removeItem(`att_${key}`);else localStorage.setItem(`att_${key}`,val);render();
  }));
  document.querySelectorAll('.edit-att-btn').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();localStorage.removeItem(`att_${btn.dataset.key}`);render();
  }));
  if(showEditProfile)bindEditProfileModal();
}

  --red-dim:#e11d4812;
  --input-bg:#f4f6fb;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{background:var(--bg);color:var(--text);transition:background .25s,color .25s}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}

/* ── HEADER ── */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.hdr-title{font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-.3px}
.hdr-sub{font-size:12px;color:var(--text3);margin-top:2px;font-weight:500}
.hdr-btns{display:flex;gap:6px;align-items:center}
.icon-btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:600;transition:all .2s;white-space:nowrap}
.icon-btn:active{transform:scale(.96)}

/* ── BOTTOM NAV ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 0 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-ico{font-size:19px;line-height:1}
.nav-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.2px;margin-top:1px}
.nav-lbl.on{color:var(--accent)}
.nav-bar{width:20px;height:3px;border-radius:3px;background:var(--accent);margin-top:2px}

/* ── CONTENT ── */
.content{padding:16px 14px 90px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.card+.card,.card+.class-card,.class-card+.card,.class-card+.class-card{margin-top:10px}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 8px 12px;text-align:center;box-shadow:var(--shadow)}
.stat-n{font-size:26px;font-weight:800;color:var(--accent);line-height:1;margin:4px 0 3px}
.stat-ico{font-size:18px}
.stat-lbl{font-size:11px;color:var(--text3);font-weight:600}

/* ── CLASS CARD ── */
.class-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 14px 12px;border-left:4px solid transparent;box-shadow:var(--shadow)}
.cc-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:6px}
.cc-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.cc-time{font-size:15px;font-weight:800;color:var(--accent)}
.cc-sub{font-size:12px;color:var(--text3);margin-top:2px}
.pill{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;display:inline-block;letter-spacing:.2px}
.att-row{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.att-btn{flex:1;border:1.5px solid;border-radius:10px;padding:8px 4px;cursor:pointer;font-size:11px;font-weight:700;transition:all .2s;text-align:center}
.btn-p{background:var(--green-dim);color:var(--green);border-color:var(--green)}
.btn-p.dim{opacity:.38}
.btn-a{background:var(--red-dim);color:var(--red);border-color:var(--red)}
.btn-a.dim{opacity:.38}
.btn-c{background:#ffffff10;color:var(--text3);border-color:var(--border)}
.btn-c.dim{opacity:.38}
.att-btn:active{transform:scale(.96)}
.clear-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:600;padding:4px 0 0;display:block;margin:0 auto;text-decoration:underline;text-underline-offset:2px}
.disc{font-size:11px;color:var(--yellow);background:var(--yellow-dim);border:1px solid var(--yellow);border-radius:8px;padding:8px 10px;margin-bottom:10px;line-height:1.5}
.break-sep{text-align:center;color:var(--text3);font-size:12px;margin:10px 0;display:flex;align-items:center;gap:8px}
.break-sep::before,.break-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── WEEK STRIP ── */
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wd{text-align:center;cursor:pointer;border-radius:12px;padding:8px 2px 6px;border:1px solid var(--border);transition:all .15s}
.wd:active{transform:scale(.93)}
.wd-day{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.wd-num{font-size:15px;font-weight:800;color:var(--text);margin:3px 0}
.wd-dot{font-size:11px;font-weight:700;color:var(--accent)}

/* ── CALENDAR ── */
.cal-hdr-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-hdr-cell{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px 0;letter-spacing:.3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 1px;min-height:44px}
.cal-cell:active{transform:scale(.93)}
.cal-num{font-size:13px;font-weight:800;color:var(--text)}
.cal-badge{font-size:9px;font-weight:800;background:var(--accent);color:#fff;border-radius:20px;padding:1px 5px;margin-top:2px;white-space:nowrap}
.cal-hint{font-size:9px;margin-top:2px}

/* ── NAV ARROWS ── */
.nav-arrows{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.arr{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;cursor:pointer;color:var(--text);font-size:18px;font-weight:700;transition:all .15s}
.arr:active{transform:scale(.93)}
.nav-mid{flex:1;text-align:center}
.nav-mid-title{font-size:15px;font-weight:800;color:var(--text)}
.nav-mid-sub{font-size:12px;color:var(--accent);font-weight:700;margin-top:2px}
.today-btn{display:block;margin:0 auto 16px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:20px;padding:7px 20px;color:var(--accent);font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.today-btn:active{transform:scale(.96)}
.badge{background:var(--accent-dim);color:var(--accent);border-radius:20px;padding:2px 9px;font-size:12px;margin-left:6px;font-weight:700}

/* ── SECTION LABEL ── */
.sec-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}

/* ── ALERT BOX ── */
.alert{border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;font-weight:600;text-align:center}

/* ── ATTENDANCE ── */
.att-overall{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 16px;text-align:center;box-shadow:var(--shadow);margin-bottom:12px}
.att-pct{font-size:52px;font-weight:900;line-height:1;letter-spacing:-2px}
.att-pct-sub{font-size:13px;color:var(--text3);margin-top:6px}
.att-prog{height:10px;background:var(--border);border-radius:10px;overflow:hidden;margin:14px 0 6px}
.att-prog-fill{height:100%;border-radius:10px;transition:width .6s}
.att-prog-marks{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);padding:0 2px}
.att-mini-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.att-mini{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.att-mini-n{font-size:22px;font-weight:800;margin-top:3px}
.att-mini-lbl{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:2px}
.subj-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow)}
.subj-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.subj-name{font-size:13px;font-weight:700;color:var(--text)}
.subj-pct{font-size:18px;font-weight:800}
.subj-bar-bg{height:8px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:6px}
.subj-bar-fill{height:100%;border-radius:8px;transition:width .5s}
.subj-counts{display:flex;gap:12px;font-size:11px;color:var(--text3)}
.recent-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.recent-row:last-child{border-bottom:none}

/* ── ANALYTICS ── */
.ana-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ana-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
.ana-ico{font-size:20px;margin-bottom:6px}
.ana-n{font-size:22px;font-weight:800;color:var(--accent)}
.ana-lbl{font-size:11px;color:var(--text3);font-weight:600;margin-top:2px}

/* ── ONBOARDING ── */
.onboard{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;background:var(--bg)}
.ob-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:28px 22px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.ob-title{font-size:24px;font-weight:800;color:var(--accent);margin-bottom:6px}
.ob-sub{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.6}
.ob-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px}
.ob-input{width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:16px;outline:none;transition:border-color .2s}
.ob-input:focus{border-color:var(--accent)}
.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ob-chip{padding:11px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:all .2s;user-select:none}
.ob-chip.sel{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.ob-chip:active{transform:scale(.96)}
.ob-chip-title{font-size:13px;font-weight:700;pointer-events:none}
.ob-chip-sub{font-size:10px;margin-top:3px;opacity:.8;pointer-events:none}
.sec-sel{width:100%;padding:7px 10px;border-radius:8px;border:1.5px solid var(--accent);background:var(--input-bg);color:var(--text);font-size:13px;font-weight:600;outline:none;margin-top:8px;pointer-events:auto}
.ob-btn{width:100%;padding:14px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;transition:all .2s}
.ob-btn:disabled{opacity:.35;cursor:not-allowed}
.ob-btn:not(:disabled):active{transform:scale(.97)}
.ob-btn.sec{background:var(--card2);color:var(--text2);border:1px solid var(--border)}

/* ── EDIT PROFILE MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.sheet{background:var(--card);border-radius:22px 22px 0 0;padding:20px 18px 36px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,.5)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 18px}
.sheet-title{font-size:18px;font-weight:800;margin-bottom:4px}
.sheet-sub{font-size:13px;color:var(--text3);margin-bottom:20px}

.admin-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;background:var(--bg)}
.admin-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px 20px;width:100%;max-width:420px;box-shadow:var(--shadow)}
.admin-title{font-size:19px;font-weight:800;color:var(--accent);margin-bottom:4px}
.admin-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.admin-input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s}
.admin-input:focus{border-color:var(--accent)}
.admin-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:all .2s}
.admin-btn:disabled{opacity:.35;cursor:not-allowed}
.admin-btn.danger{background:var(--red)}
.admin-btn.sec{background:var(--card2);color:var(--text2);border:1px solid var(--border)}
.sync-msg{font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:10px;font-weight:600}
.sync-ok{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}
.sync-err{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}
.sync-info{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}

@keyframes spin{to{transform:rotate(360deg)}}
.preview-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;display:block;overflow-x:auto}
.preview-tbl th{background:var(--card2);padding:6px 8px;text-align:left;font-weight:700}
.preview-tbl td{padding:5px 8px;border-bottom:1px solid var(--border)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* ── WEEKLY DAY CARDS ── */
.week-day-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);transition:all .15s}

function buildSched(){
  sched={};
  if(!subjs.length)return;
  const s=new Set(subjs);
  RAW.forEach(([date,week,subj,ses,room,slot])=>{
    if(!s.has(subj))return;
    if(!sched[date])sched[date]=[];
    sched[date].push({date,week,subj,ses,room,slot,key:`${date}|${subj}|${ses}`});
  });
  Object.keys(sched).forEach(d=>sched[d].sort((a,b)=>a.slot-b.slot));
}
buildSched();

function att(key){return localStorage.getItem('att_'+key);}
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isToday(d){return fmt(d)===fmt(new Date());}
function getDL(d){
  const s=fmt(d);
  if(HOLIDAYS[s])return{t:HOLIDAYS[s],c:'hol'};
  if(SPECIAL[s])return{t:SPECIAL[s],c:'sp'};
  const dt=new Date(s+'T00:00:00');
  if(dt>=new Date('2026-09-07')&&dt<=new Date('2026-09-17')&&s!=='2026-09-14')return{t:'ET Exam Week',c:'exam'};
  if(SIP.includes(s))return{t:'SIP Presentations',c:'sip'};
  return null;
}
function weekOf(base){
  const d=new Date(base),dow=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-((dow+6)%7));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});
}
function pill(subj){
  const s=ALL_SUBJECTS[subj];if(!s)return'';
  return`<span class="pill" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}44">${s.short}</span>`;
}
function getPW(){return localStorage.getItem(LS_PW)||DEFAULT_PW;}

function render(){

        <button class="icon-btn" id="gearBtn">⚙️</button>

    ${showEdit?renderEditModal():''}
    <div class="content" id="content"></div>

  bindEvents();
}

/* ── CLASS CARD ── */
function classCard(c,nextHighlight=false,showAttBtns=false){
  const s=ALL_SUBJECTS[c.subj],sl=SLOTS[c.slot];
  if(!s)return'';
  const a=att(c.key);
  const attBadge=a?`<span class="pill" style="background:${a==='P'?'#22c55e20':a==='A'?'#f43f5e20':'#ffffff10'};color:${a==='P'?'var(--green)':a==='A'?'var(--red)':'var(--text3)'};border:1px solid ${a==='P'?'var(--green)':a==='A'?'var(--red)':'var(--border)'}">${a==='P'?'✅ Present':a==='A'?'❌ Absent':'🔵 Cancelled'}</span>`:'';
  const attHTML=showAttBtns?`
    <div class="disc">📌 Personal reference only — official records kept by institute.</div>
    <div class="att-row">
      <button class="att-btn btn-p ${a&&a!=='P'?'dim':''}" data-key="${c.key}" data-val="P">✅ Present</button>
      <button class="att-btn btn-a ${a&&a!=='A'?'dim':''}" data-key="${c.key}" data-val="A">❌ Absent</button>
      <button class="att-btn btn-c ${a&&a!=='C'?'dim':''}" data-key="${c.key}" data-val="C">🔵 Cancel</button>
    </div>
    ${a?`<button class="clear-btn" data-key="${c.key}">Clear marking</button>`:''}`:''
  ;
  return`<div class="class-card" style="border-left-color:${s.color}${nextHighlight?';border-color:'+s.color+';background:'+s.color+'0d':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <div style="flex:1;min-width:0">
        <div class="cc-name">${s.name}</div>
        <div class="cc-meta">
          ${pill(c.subj)}
          ${nextHighlight?`<span class="pill" style="background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)">⚡ Next</span>`:''}
          ${attBadge}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="cc-time">${sl.s}</div>
        <div class="cc-sub">– ${sl.e}</div>
        <div class="cc-sub" style="margin-top:3px">🏛 ${c.room}</div>

      </div>
    </div>

  </div>`;
}

  const next=tc.find(c=>{const[h,m]=SLOTS[c.slot].s.split(':').map(Number);return h*60+m>=nowM;});
  const lbl=getDL(t);
  const wn=tc[0]?.week;
  return`

/* ── ATTENDANCE ── */
function vAttendance(){
  const myS=[...new Set(subjs)];
  const stats={};myS.forEach(s=>{stats[s]={P:0,A:0,C:0,total:0};});
  let tP=0,tA=0,tC=0,tAll=0;
  RAW.forEach(([date,,subj,ses])=>{
    if(!stats[subj])return;
    const a=att(`${date}|${subj}|${ses}`);
    stats[subj].total++;tAll++;
    if(a==='P'){stats[subj].P++;tP++;}else if(a==='A'){stats[subj].A++;tA++;}else if(a==='C'){stats[subj].C++;tC++;}
  });
  const marked=tP+tA+tC,den=tP+tA;
  const pct=den>0?Math.round(tP/den*100):null;
  const pctCol=pct===null?'var(--text3)':pct>=85?'var(--green)':pct>=75?'var(--yellow)':'var(--red)';
  const safe=pct!==null&&pct>=85?Math.max(0,Math.floor(tP/0.85)-den):0;
  const needMore=den>0&&pct<85?Math.max(0,Math.ceil(0.85*den)-tP):0;
  const recent=[];
  RAW.forEach(([date,,subj,ses])=>{
    if(!stats[subj])return;
    const k=`${date}|${subj}|${ses}`,a=att(k);
    if(a)recent.push({date,subj,ses,a});
  });
  recent.sort((a,b)=>b.date.localeCompare(a.date));

  return`
    <div style="font-size:20px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px">Attendance Tracker</div>

    <!-- Overall -->
    <div class="att-overall">
      <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Overall Attendance</div>
      <div class="att-pct" style="color:${pctCol}">${pct!==null?pct+'%':'–'}</div>
      <div class="att-pct-sub">${tP} Present &nbsp;·&nbsp; ${tA} Absent &nbsp;·&nbsp; ${tC} Cancelled</div>
      <div class="att-prog">
        <div class="att-prog-fill" style="width:${pct||0}%;background:${pctCol}"></div>
      </div>
      <div class="att-prog-marks">
        <span>0%</span><span style="color:var(--yellow);font-weight:700">75%</span><span style="color:var(--green);font-weight:700">85% ✓</span><span>100%</span>
      </div>
    </div>

    <!-- Alert -->
    ${pct!==null?(pct<85
      ?`<div class="alert" style="background:var(--red-dim);border:1px solid var(--red);color:var(--red);margin-bottom:12px">⚠️ Below 85% — need ${needMore} more present class${needMore===1?'':'es'}</div>`
      :`<div class="alert" style="background:var(--green-dim);border:1px solid var(--green);color:var(--green);margin-bottom:12px">✅ On track — can miss ${safe} more class${safe===1?'':'es'} and stay ≥85%</div>`)
    :''}

    <!-- Mini stats -->
    <div class="att-mini-row">
      <div class="att-mini">
        <div class="att-mini-lbl">Marked</div>
        <div class="att-mini-n" style="color:var(--accent)">${marked}</div>
        <div style="font-size:11px;color:var(--text3)">of ${tAll} total</div>
      </div>
      <div class="att-mini">
        <div class="att-mini-lbl">Unmarked</div>
        <div class="att-mini-n" style="color:var(--yellow)">${tAll-marked}</div>
        <div style="font-size:11px;color:var(--text3)">pending</div>
      </div>
    </div>

    <!-- Subject breakdown -->
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">Subject Breakdown</div>
    ${myS.map(subj=>{
      const s=ALL_SUBJECTS[subj],st=stats[subj];
      const d2=st.P+st.A,p2=d2>0?Math.round(st.P/d2*100):null;
      const col=p2===null?'var(--text3)':p2>=85?'var(--green)':p2>=75?'var(--yellow)':'var(--red)';
      return`<div class="subj-row">
        <div class="subj-top">
          <div>
            ${pill(subj)}
            <div style="font-size:12px;color:var(--text3);margin-top:4px">${s.name}</div>
          </div>
          <div class="subj-pct" style="color:${col}">${p2!==null?p2+'%':'–'}</div>
        </div>
        <div class="subj-bar-bg"><div class="subj-bar-fill" style="width:${p2||0}%;background:${col}"></div></div>
        <div class="subj-counts">
          <span>✅ ${st.P} present</span>
          <span>❌ ${st.A} absent</span>
          <span>🔵 ${st.C} cancelled</span>
        </div>
      </div>`;
    }).join('')}

    <!-- Recent -->
    <div class="card" style="margin-top:4px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px">Recent Activity</div>
      ${recent.length===0
        ?`<div style="text-align:center;color:var(--text3);padding:20px;font-size:13px">No attendance marked yet.<br>Go to <b>Daily</b> tab to mark.</div>`
        :recent.slice(0,15).map(({date,subj,ses,a})=>{
          const col=a==='P'?'var(--green)':a==='A'?'var(--red)':'var(--text3)';
          return`<div class="recent-row">
            <div style="display:flex;align-items:center;gap:8px">
              ${pill(subj)}
              <span style="font-size:12px;color:var(--text3)">${new Date(date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})} · Ses ${ses}</span>
            </div>
            <span style="font-size:12px;font-weight:700;color:${col}">${a==='P'?'Present':a==='A'?'Absent':'Cancelled'}</span>
          </div>`;
        }).join('')}
    </div>`;
}

/* ── ANALYTICS ── */
function vAnalytics(){
  let total=0,pS={},pD={Mon:0,Tue:0,Wed:0,Thu:0,Fri:0,Sat:0,Sun:0};
  Object.entries(sched).forEach(([d,cls])=>{
    total+=cls.length;
    const dow=DAYS[new Date(d+'T00:00:00').getDay()];
    pD[dow]=(pD[dow]||0)+cls.length;
    cls.forEach(c=>{pS[c.subj]=(pS[c.subj]||0)+1;});
  });
  const top=Object.entries(pS).sort((a,b)=>b[1]-a[1])[0];
  const bd=Object.entries(pD).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])[0];
  return`
    <div style="font-size:20px;font-weight:800;margin-bottom:18px;letter-spacing:-.3px">Analytics</div>
    <div class="ana-grid">
      ${[{l:'Total Classes',v:total,i:'📚'},{l:'Total Hours',v:total*1.5+'h',i:'⏱'},{l:'Most Frequent',v:ALL_SUBJECTS[top?.[0]]?.short||'–',i:'🏆'},{l:'Busiest Day',v:bd?.[0]||'–',i:'🔥'}].map(x=>`
      <div class="ana-box"><div class="ana-ico">${x.i}</div><div class="ana-n">${x.v}</div><div class="ana-lbl">${x.l}</div></div>`).join('')}
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px">Classes per Subject</div>
      ${Object.entries(pS).sort((a,b)=>b[1]-a[1]).map(([subj,n])=>{
        const s=ALL_SUBJECTS[subj],p=total>0?Math.round(n/total*100):0;
        return`<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <div style="display:flex;align-items:center;gap:6px">${pill(subj)}<span style="font-size:12px;color:var(--text3)">${s.name}</span></div>
            <span style="font-size:12px;color:var(--text3);font-weight:600">${n} · ${p}%</span>
          </div>
          <div style="height:8px;background:var(--border);border-radius:8px;overflow:hidden">
            <div style="height:8px;background:${s.color};width:${p}%;border-radius:8px;transition:width .5s"></div>
          </div>
        </div>`;}).join('')}
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px">Day-wise Distribution</div>
      ${Object.entries(pD).map(([day,n])=>{
        const mx=Math.max(...Object.values(pD)),p=mx>0?Math.round(n/mx*100):0;
        return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:34px;font-size:12px;font-weight:700;color:var(--text3)">${day}</div>
          <div style="flex:1;height:9px;background:var(--border);border-radius:8px;overflow:hidden">
            <div style="height:9px;background:var(--accent);width:${n?p:0}%;border-radius:8px;transition:width .5s;opacity:${n?1:0}"></div>
          </div>
          <div style="width:24px;font-size:12px;color:${n?'var(--accent)':'var(--text3)'};font-weight:700;text-align:right">${n}</div>
        </div>`;}).join('')}
    </div>`;
}

        <div class="ob-chip-sub">${sel?'Section '+sel:secs.join(' / ')}</div>
        ${sel?`<select class="sec-sel" id="osel-${c}" style="border-color:${col}">${secs.map(s=>`<option value="${s}" ${sel===s?'selected':''}>${s}</option>`).join('')}</select>`:''}
      </div>`;
    }).join('');
    document.getElementById('obNext2').disabled=!Object.keys(tmpSel).length;
    attM();
  }
  function reS(){
    const g=document.getElementById('obSingle');if(!g)return;
    g.innerHTML=SSC.map(c=>{
      const s=ALL_SUBJECTS[c],isSel=tmpSel[c]==='yes';
      return`<div class="ob-chip ${isSel?'sel':''}" data-single="${c}" style="${isSel?`border-color:${s.color};background:${s.color}18;color:${s.color}`:''}">
        <div class="ob-chip-title">${c}</div>
        <div class="ob-chip-sub">${s.name.substring(0,28)}${s.name.length>28?'…':''}</div>
      </div>`;
    }).join('');
    document.getElementById('obNext2').disabled=!Object.keys(tmpSel).length;
    attS();
  }
  function attM(){
    document.querySelectorAll('[data-course]').forEach(el=>{
      el.addEventListener('click',e=>{
        if(e.target.tagName==='SELECT'||e.target.tagName==='OPTION')return;
        const c=el.dataset.course;
        if(tmpSel[c])delete tmpSel[c];else tmpSel[c]=CWS[c][0];
        reM();
      });
    });
    document.querySelectorAll('[id^="osel-"]').forEach(s=>{
      s.addEventListener('change',e=>{e.stopPropagation();tmpSel[e.target.id.replace('osel-','')]=e.target.value;});
    });
  }
  function attS(){
    document.querySelectorAll('[data-single]').forEach(el=>{
      el.addEventListener('click',()=>{
        const c=el.dataset.single;
        if(tmpSel[c])delete tmpSel[c];else tmpSel[c]='yes';
        reS();
      });
    });
  }
  attM();attS();
  document.getElementById('obBack')?.addEventListener('click',()=>{obStep=1;render();bindOnboard();});
  document.getElementById('obNext2')?.addEventListener('click',()=>{
    const res=[];
    Object.entries(tmpSel).forEach(([c,v])=>res.push(v==='yes'?c:`${c}-${v}`));
    name=tmpName.trim();subjs=res;
    localStorage.setItem('studentName',name);localStorage.setItem('chosenSubjects',JSON.stringify(subjs));
    buildSched();render();
  });
}

/* ── ADMIN ── */
function renderAdmin(){
  if(!adminIn){return`<div class="admin-wrap"><div class="admin-card">
    <div class="admin-title">🔐 Admin Panel</div>
    <div class="admin-sub">MBA Timetable — Admin Access</div>
    <label class="ob-label" style="display:block;margin-bottom:6px">Password</label>
    <input class="admin-input" id="apw" type="password" placeholder="Enter password"/>
    <div id="apwErr" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none">Incorrect password</div>
    <button class="admin-btn" id="aLogin">Login →</button>
    <button class="admin-btn sec" id="aBack" style="margin-top:4px">← Back to App</button>
  </div></div>`;}
  const ls=localStorage.getItem(LS_SYNC);
  const live=isLive();
  return`<div class="admin-wrap" style="justify-content:flex-start;padding-top:30px">
    <div class="admin-card">
      <div class="admin-title">⚙️ Admin Panel</div>
      <div class="admin-sub">Logged in</div>
      <div style="font-size:12px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:12px;background:${live?'var(--green-dim)':'var(--yellow-dim)'}">
        ${live?`✅ Live Sheet — Last synced: ${ls?new Date(ls).toLocaleString('en-IN'):'Unknown'}`:`⚠️ Using built-in fallback data`}
      </div>
      <label class="ob-label" style="display:block;margin-bottom:6px">Google Sheet CSV URL</label>
      <input class="admin-input" id="aUrl" value="${adminUrl}" style="font-size:11px"/>
      ${adminMsg?`<div class="sync-msg ${adminMsg.c}">${adminMsg.t}</div>`:''}
      ${adminPrev?`<div style="margin-bottom:10px">
        <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:6px">Preview (first 5 of ${adminPrev.length})</div>
        <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--border)">
          <table class="preview-tbl"><thead><tr><th>Date</th><th>Wk</th><th>Subject</th><th>Ses</th><th>Room</th><th>Slot</th></tr></thead>
          <tbody>${adminPrev.slice(0,5).map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`).join('')}</tbody></table>
        </div>
        <button class="admin-btn" id="aConfirm" style="margin-top:8px;background:var(--green)">✅ Apply ${adminPrev.length} entries</button>
        <button class="admin-btn sec" id="aCancelPrev">Cancel</button>
      </div>`:''}
      ${!adminPrev?`<button class="admin-btn" id="aFetch" ${adminSyncing?'disabled':''}>${adminSyncing?'<span class="spinner"></span>Fetching…':'🔄 Fetch & Preview'}</button>`:''}
      <hr class="divider"/>
      <label class="ob-label" style="display:block;margin-bottom:6px">Change Password</label>
      <input class="admin-input" id="aNpw" type="password" placeholder="New password (min 6)"/>
      <input class="admin-input" id="aCpw" type="password" placeholder="Confirm password"/>
      <button class="admin-btn sec" id="aChPw">🔑 Update Password</button>
      <div id="aPwMsg" style="font-size:12px;margin-top:4px;display:none"></div>
      <hr class="divider"/>
      <button class="admin-btn danger" id="aClear">🗑 Revert to Built-in Data</button>
      <button class="admin-btn sec" id="aLogout" style="margin-top:6px">← Logout</button>
    </div>
  </div>`;
}
function bindAdmin(){
  if(!adminIn){
    const inp=document.getElementById('apw'),btn=document.getElementById('aLogin'),err=document.getElementById('apwErr');
    document.getElementById('aBack')?.addEventListener('click',()=>{adminMode=false;render();});
    const go=()=>{if(inp.value===getPW()){adminIn=true;adminMsg=null;render();}else{err.style.display='block';inp.value='';}};
    btn?.addEventListener('click',go);inp?.addEventListener('keydown',e=>{if(e.key==='Enter')go();});return;
  }
  document.getElementById('aLogout')?.addEventListener('click',()=>{adminIn=false;adminMode=false;adminMsg=null;adminPrev=null;render();});
  document.getElementById('aFetch')?.addEventListener('click',async()=>{
    const u=document.getElementById('aUrl').value.trim();if(!u){adminMsg={c:'sync-err',t:'❌ Please enter a URL'};render();return;}
    adminUrl=u;localStorage.setItem(LS_URL,u);adminSyncing=true;adminMsg={c:'sync-info',t:'<span class="spinner"></span>Fetching…'};adminPrev=null;render();bindAdmin();
    try{
      const r=await fetch(u+'&t='+Date.now());if(!r.ok)throw new Error('HTTP '+r.status);
      const txt=await r.text();const lines=txt.trim().split('\n');
      if(lines.length<2)throw new Error('No rows');
      const hdrs=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
      const rows=[];
      for(let i=1;i<lines.length;i++){
        const cols=lines[i].split(',').map(c=>c.trim().replace(/"/g,''));
        if(cols.length<hdrs.length)continue;
        const o={};hdrs.forEach((h,idx)=>o[h]=cols[idx]||'');
        if(!o.date||!o.subject)continue;
        rows.push([o.date,parseInt(o.week)||1,o.subject,o.session||'1',o.room||'TBD',parseInt(o.slot)||0]);
      }
      if(!rows.length)throw new Error('No valid rows');
      adminPrev=rows;adminSyncing=false;adminMsg={c:'sync-ok',t:`✅ Fetched ${rows.length} entries. Review below.`};
    }catch(e){adminSyncing=false;adminMsg={c:'sync-err',t:`❌ ${e.message}`};}
    render();bindAdmin();
  });
  document.getElementById('aConfirm')?.addEventListener('click',()=>{
    if(!adminPrev)return;
    localStorage.setItem(LS_TT,JSON.stringify(adminPrev));localStorage.setItem(LS_SYNC,new Date().toISOString());
    RAW=adminPrev;buildSched();adminPrev=null;adminMsg={c:'sync-ok',t:`✅ Applied! ${RAW.length} entries live.`};render();bindAdmin();
  });
  document.getElementById('aCancelPrev')?.addEventListener('click',()=>{adminPrev=null;adminMsg=null;render();bindAdmin();});
  document.getElementById('aClear')?.addEventListener('click',()=>{
    if(confirm('Revert to built-in data?')){localStorage.removeItem(LS_TT);localStorage.removeItem(LS_SYNC);RAW=FALLBACK;buildSched();adminMsg={c:'sync-info',t:'ℹ️ Reverted to built-in data.'};adminPrev=null;render();bindAdmin();}
  });
  document.getElementById('aChPw')?.addEventListener('click',()=>{
    const np=document.getElementById('aNpw').value,cp=document.getElementById('aCpw').value,msg=document.getElementById('aPwMsg');
    if(np.length<6){msg.style.display='block';msg.style.color='var(--red)';msg.textContent='Min 6 characters.';return;}
    if(np!==cp){msg.style.display='block';msg.style.color='var(--red)';msg.textContent='Passwords do not match.';return;}
    localStorage.setItem(LS_PW,np);msg.style.display='block';msg.style.color='var(--green)';msg.textContent='✅ Updated!';
    document.getElementById('aNpw').value='';document.getElementById('aCpw').value='';
  });
}

/* ── EVENTS ── */
function bindEvents(){
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{view=b.dataset.view;render();}));
  document.getElementById('themeBtn')?.addEventListener('click',()=>{dark=!dark;localStorage.setItem('theme',dark?'dark':'light');render();});
  document.getElementById('editBtn')?.addEventListener('click',()=>{
    editName=name;editSel={};
    subjs.forEach(k=>{const s=ALL_SUBJECTS[k];if(!s)return;if(s.section)editSel[s.course]=s.section;else editSel[s.course]='yes';});
    showEdit=true;render();bindEditModal();
  });
  document.getElementById('gearBtn')?.addEventListener('click',()=>{
    gearN++;clearTimeout(gearT);
    if(gearN>=5){gearN=0;adminMode=true;adminIn=false;render();return;}
    gearT=setTimeout(()=>{gearN=0;},700);
  });
  document.querySelectorAll('[data-date]').forEach(el=>el.addEventListener('click',()=>{selDate=new Date(el.dataset.date+'T00:00:00');view='daily';render();}));
  document.querySelectorAll('[data-goto-date]').forEach(el=>el.addEventListener('click',()=>{selDate=new Date(el.getAttribute('data-goto-date')+'T00:00:00');view='daily';render();}));
  document.getElementById('prevDay')?.addEventListener('click',()=>{const d=new Date(selDate);d.setDate(d.getDate()-1);selDate=d;render();});
  document.getElementById('nextDay')?.addEventListener('click',()=>{const d=new Date(selDate);d.setDate(d.getDate()+1);selDate=d;render();});
  document.getElementById('goToday')?.addEventListener('click',()=>{selDate=new Date();render();});
  document.getElementById('prevWeek')?.addEventListener('click',()=>{const d=new Date(wkBase);d.setDate(d.getDate()-7);wkBase=d;render();});
  document.getElementById('nextWeek')?.addEventListener('click',()=>{const d=new Date(wkBase);d.setDate(d.getDate()+7);wkBase=d;render();});
  document.getElementById('goThisWeek')?.addEventListener('click',()=>{wkBase=new Date();render();});
  document.getElementById('prevMonth')?.addEventListener('click',()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1);render();});
  document.getElementById('nextMonth')?.addEventListener('click',()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1);render();});
  document.querySelectorAll('.att-btn').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();const k=b.dataset.key,v=b.dataset.val,cur=att(k);
    if(cur===v)localStorage.removeItem('att_'+k);else localStorage.setItem('att_'+k,v);render();
  }));
  document.querySelectorAll('.clear-btn').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();localStorage.removeItem('att_'+b.dataset.key);render();
  }));
  if(showEdit)bindEditModal();
}

/* ── PWA ── */
(function(){
  function mkIcon(sz){
    const c=document.createElement('canvas');c.width=c.height=sz;
    const ctx=c.getContext('2d');ctx.fillStyle='#6c6ff5';
    const r=sz*.2;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(sz-r,0);ctx.quadraticCurveTo(sz,0,sz,r);ctx.lineTo(sz,sz-r);ctx.quadraticCurveTo(sz,sz,sz-r,sz);ctx.lineTo(r,sz);ctx.quadraticCurveTo(0,sz,0,sz-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.fill();
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`bold ${sz*.26}px sans-serif`;ctx.fillText('TT',sz/2,sz*.4);
    ctx.font=`bold ${sz*.1}px sans-serif`;ctx.fillText('PLANNER',sz/2,sz*.62);
    return c.toDataURL('image/png');
  }
  const i192=mkIcon(192),i512=mkIcon(512);
  const mf={name:'MBA Timetable',short_name:'TT Planner',start_url:'./',display:'standalone',background_color:'#0d0f1a',theme_color:'#6c6ff5',icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  const bl=new Blob([JSON.stringify(mf)],{type:'application/json'});
  const lk=document.createElement('link');lk.rel='manifest';lk.href=URL.createObjectURL(bl);document.head.appendChild(lk);
  const al=document.createElement('link');al.rel='apple-touch-icon';al.href=i192;document.head.appendChild(al);
  if('serviceWorker' in navigator){
    const sw=`const C='mba-tt-v5';self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
  }
})();

if(localStorage.getItem('theme')==='light')dark=false;
render();
